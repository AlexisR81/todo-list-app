name: CI/CD - Build & Deploy Todo App

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: todo-app
  APP_PORT: 3000

jobs:
  build-and-push:
    name: Build & Push image vers ECR
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login sur Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag et push de l'image Docker
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    name: Déployer sur EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Authentification ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ secrets.ECR_REGISTRY_URL }}

            # Arrêt du conteneur existant
            docker stop todo-app 2>/dev/null || true
            docker rm   todo-app 2>/dev/null || true

            # Pull et lancement du nouveau conteneur
            docker pull ${{ needs.build-and-push.outputs.image_uri }}

            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              -e MYSQL_HOST="${{ secrets.DB_HOST }}" \
              -e MYSQL_USER="${{ secrets.DB_USER }}" \
              -e MYSQL_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e MYSQL_DB="${{ secrets.DB_NAME }}" \
              ${{ needs.build-and-push.outputs.image_uri }}

            # Nettoyage des anciennes images
            docker image prune -f
