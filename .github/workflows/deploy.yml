name: CI/CD - Build & Deploy Todo App

on:
  push:
    branches: [main]

env:
  APP_PORT: 3000

jobs:
  build-and-push:
    name: Build & Push image vers Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag et push de l'image Docker
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    name: Déployer sur EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: IMAGE_URI,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME
          script: |
            echo "$DOCKERHUB_TOKEN" | docker login \
              --username "$DOCKERHUB_USERNAME" --password-stdin

            docker stop todo-app 2>/dev/null || true
            docker rm   todo-app 2>/dev/null || true

            docker pull "$IMAGE_URI"

            docker run -d \
              --name todo-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e MYSQL_HOST="$DB_HOST" \
              -e MYSQL_USER="$DB_USER" \
              -e MYSQL_PASSWORD="$DB_PASSWORD" \
              -e MYSQL_DB="$DB_NAME" \
              "$IMAGE_URI"

            docker image prune -f
